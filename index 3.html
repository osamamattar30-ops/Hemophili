<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hemophilia MCQ Quiz</title>
  <style>
    :root{
      --bg:#eef4fb;
      --card:#ffffff;
      --primary:#8d1f2d;
      --primary-dark:#68151f;
      --accent:#1f5ea8;
      --text:#1f2937;
      --muted:#6b7280;
      --correct:#d8f3dc;
      --correct-border:#2e7d32;
      --wrong:#fde2e2;
      --wrong-border:#c62828;
      --explain:#fff8df;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      min-height:100vh;
      font-family:Arial, Helvetica, sans-serif;
      background:linear-gradient(135deg,#eef4fb,#f9fbff);
      color:var(--text);
      padding:18px;
    }
    .app{
      width:min(820px,100%);
      margin:0 auto;
    }
    .header{
      background:linear-gradient(135deg,var(--primary),var(--primary-dark));
      color:#fff;
      padding:22px;
      border-radius:20px 20px 0 0;
      text-align:center;
      box-shadow:0 12px 35px rgba(0,0,0,.12);
    }
    .header h1{margin:0 0 8px;font-size:clamp(26px,5vw,42px)}
    .header p{margin:0;opacity:.9}
    .card{
      background:var(--card);
      padding:24px;
      border-radius:0 0 20px 20px;
      box-shadow:0 12px 35px rgba(0,0,0,.12);
    }
    .topbar{
      display:flex;
      justify-content:space-between;
      gap:15px;
      align-items:center;
      margin-bottom:14px;
      font-weight:bold;
    }
    .progress-wrap{
      width:100%;
      height:12px;
      background:#e5e7eb;
      border-radius:999px;
      overflow:hidden;
      margin-bottom:24px;
    }
    .progress{
      height:100%;
      width:0;
      background:linear-gradient(90deg,var(--accent),#57a0e8);
      transition:.3s;
    }
    .question{
      font-size:clamp(20px,3.5vw,28px);
      line-height:1.4;
      margin:0 0 22px;
    }
    .options{
      display:grid;
      gap:12px;
    }
    .option{
      border:2px solid #d8dee8;
      background:#f8fafc;
      padding:15px 17px;
      border-radius:13px;
      cursor:pointer;
      font-size:17px;
      text-align:left;
      transition:.2s;
    }
    .option:hover{
      border-color:var(--accent);
      transform:translateY(-1px);
      background:#f0f7ff;
    }
    .option.correct{
      background:var(--correct);
      border-color:var(--correct-border);
    }
    .option.wrong{
      background:var(--wrong);
      border-color:var(--wrong-border);
    }
    .option:disabled{
      cursor:default;
      transform:none;
    }
    .explanation{
      margin-top:18px;
      padding:14px;
      border-left:5px solid #e6a700;
      background:var(--explain);
      border-radius:9px;
      line-height:1.6;
    }
    .actions{
      display:flex;
      justify-content:flex-end;
      margin-top:18px;
    }
    button.main{
      border:none;
      color:white;
      background:var(--accent);
      padding:13px 24px;
      border-radius:11px;
      font-size:17px;
      font-weight:bold;
      cursor:pointer;
    }
    button.main:hover{filter:brightness(.92)}
    .result{
      text-align:center;
      padding:14px 0 5px;
    }
    .score{
      font-size:52px;
      font-weight:800;
      color:var(--primary);
      margin:12px 0;
    }
    .review{
      margin-top:22px;
      text-align:left;
    }
    .review-item{
      border:1px solid #e5e7eb;
      border-radius:12px;
      padding:14px;
      margin:10px 0;
      background:#fafafa;
    }
    .small{color:var(--muted);font-size:14px}
    @media(max-width:600px){
      .card{padding:18px}
      .topbar{font-size:14px}
      .option{font-size:16px}
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <h1>🩸 Hemophilia MCQ Quiz</h1>
      <p>20 questions • Instant correction • Final review</p>
    </div>

    <div class="card">
      <div id="quizArea">
        <div class="topbar">
          <span id="counter">Question 1 / 20</span>
          <span id="liveScore">Score: 0</span>
        </div>

        <div class="progress-wrap">
          <div class="progress" id="progress"></div>
        </div>

        <h2 class="question" id="question"></h2>
        <div class="options" id="options"></div>
        <div id="feedback"></div>

        <div class="actions">
          <button class="main" id="nextBtn" onclick="nextQuestion()" style="display:none">Next</button>
        </div>
      </div>

      <div id="resultArea" style="display:none"></div>
    </div>
  </div>

  <script>
    const questions = [
      {
        q:"Hemophilia A is caused by deficiency of:",
        o:["Factor VIII","Factor IX","Factor VII","von Willebrand factor"],
        a:0,
        e:"Hemophilia A is caused by deficiency of factor VIII."
      },
      {
        q:"Hemophilia B is caused by deficiency of:",
        o:["Factor VIII","Factor IX","Factor X","Factor XI"],
        a:1,
        e:"Hemophilia B is caused by deficiency of factor IX."
      },
      {
        q:"The inheritance pattern of hemophilia A and B is:",
        o:["Autosomal dominant","Autosomal recessive","X-linked recessive","X-linked dominant"],
        a:2,
        e:"Both hemophilia A and B are classically inherited as X-linked recessive disorders."
      },
      {
        q:"The severity of hemophilia mainly depends on:",
        o:["Platelet count","Factor activity level","Bleeding time","Hemoglobin level"],
        a:1,
        e:"Severity is determined by the residual activity of the deficient clotting factor."
      },
      {
        q:"Hemophilia affects mostly:",
        o:["Females","Males","Both sexes equally","Only newborn girls"],
        a:1,
        e:"Because it is X-linked recessive, males are affected most commonly."
      },
      {
        q:"Approximately one-third of hemophilia patients may have:",
        o:["A new mutation with negative family history","Thrombocytopenia","Vitamin K deficiency","An autosomal dominant mutation"],
        a:0,
        e:"About one-third of patients may present because of a new mutation despite a negative family history."
      },
      {
        q:"Mild hemophilia is usually apparent after:",
        o:["No trauma","Significant trauma","Minor viral infection","Eating certain foods"],
        a:1,
        e:"Mild hemophilia may only become evident after significant trauma or surgery."
      },
      {
        q:"Severe hemophilia commonly causes:",
        o:["Spontaneous bleeding","Petechiae only","No joint bleeding","Bleeding only after major surgery"],
        a:0,
        e:"Severe hemophilia can cause spontaneous bleeding and bleeding after minor trauma."
      },
      {
        q:"The most characteristic presentation of hemophilia is:",
        o:["Epistaxis","Hemarthrosis","Petechiae","Hematuria"],
        a:1,
        e:"Hemarthrosis, or bleeding into joints, is the classic presentation."
      },
      {
        q:"Repeated hemarthrosis may lead to:",
        o:["Joint destruction and deformity","Increased joint mobility","Bone marrow failure","Septic arthritis only"],
        a:0,
        e:"Repeated joint bleeding causes chronic synovial damage, cartilage destruction, and deformity."
      },
      {
        q:"A life-threatening manifestation of severe hemophilia is:",
        o:["Small bruise","Intracranial hemorrhage","Mild gum bleeding","Otitis media"],
        a:1,
        e:"Intracranial hemorrhage is a major life-threatening complication."
      },
      {
        q:"Which laboratory finding is expected in hemophilia?",
        o:["Prolonged PT","Prolonged PTT","Low platelet count","Prolonged bleeding time"],
        a:1,
        e:"The intrinsic pathway is affected, so PTT is prolonged."
      },
      {
        q:"Which test is usually normal in hemophilia?",
        o:["PTT","PT","Factor VIII level in hemophilia A","Factor IX level in hemophilia B"],
        a:1,
        e:"PT is typically normal because the extrinsic pathway is unaffected."
      },
      {
        q:"Platelet count and bleeding time in hemophilia are usually:",
        o:["Both normal","Both prolonged","Both decreased","Platelets low and bleeding time normal"],
        a:0,
        e:"Hemophilia is a coagulation factor disorder, not a platelet disorder."
      },
      {
        q:"Hemophilic arthropathy is caused by:",
        o:["Repeated joint bleeding","Calcium deficiency","Autoimmune disease","Bacterial infection"],
        a:0,
        e:"Recurrent hemarthrosis causes chronic joint damage called hemophilic arthropathy."
      },
      {
        q:"A major complication of repeated factor replacement is:",
        o:["Development of inhibitors","Vitamin D deficiency","Hypertension","Iron overload in every case"],
        a:0,
        e:"Some patients develop antibodies, called inhibitors, against the infused factor."
      },
      {
        q:"The target factor activity in serious bleeding is approximately:",
        o:["10–20%","30–40%","50%","80–100%"],
        a:3,
        e:"Serious bleeding requires urgent replacement to achieve about 80–100% factor activity."
      },
      {
        q:"The target factor activity in joint bleeding is approximately:",
        o:["10%","25%","50%","100%"],
        a:2,
        e:"For joint bleeding, the target factor activity is approximately 50%."
      },
      {
        q:"Desmopressin is mainly useful in:",
        o:["Mild hemophilia A","Severe hemophilia B","All patients with inhibitors","Hemophilia B only"],
        a:0,
        e:"Desmopressin can raise factor VIII and vWF, so it may help in mild hemophilia A."
      },
      {
        q:"Emicizumab is mainly used for:",
        o:["Acute treatment of hemophilia B","Prophylaxis in hemophilia A","Treatment of thrombocytopenia","Replacement of factor IX"],
        a:1,
        e:"Emicizumab is a bispecific monoclonal antibody used for prophylaxis in hemophilia A."
      }
    ];

    let current = 0;
    let score = 0;
    let answered = false;
    const mistakes = [];

    function renderQuestion(){
      answered = false;
      document.getElementById("feedback").innerHTML = "";
      document.getElementById("nextBtn").style.display = "none";

      const item = questions[current];
      document.getElementById("counter").textContent = `Question ${current+1} / ${questions.length}`;
      document.getElementById("liveScore").textContent = `Score: ${score}`;
      document.getElementById("progress").style.width = `${(current/questions.length)*100}%`;
      document.getElementById("question").textContent = item.q;

      const options = document.getElementById("options");
      options.innerHTML = "";

      item.o.forEach((text,index)=>{
        const btn = document.createElement("button");
        btn.className = "option";
        btn.textContent = `${String.fromCharCode(65+index)}. ${text}`;
        btn.onclick = ()=>checkAnswer(index);
        options.appendChild(btn);
      });
    }

    function checkAnswer(selected){
      if(answered) return;
      answered = true;

      const item = questions[current];
      const buttons = [...document.querySelectorAll(".option")];
      buttons.forEach(b=>b.disabled=true);

      if(selected === item.a){
        score++;
        buttons[selected].classList.add("correct");
      }else{
        buttons[selected].classList.add("wrong");
        buttons[item.a].classList.add("correct");
        mistakes.push({
          q:item.q,
          your:item.o[selected],
          correct:item.o[item.a],
          explanation:item.e
        });
      }

      document.getElementById("liveScore").textContent = `Score: ${score}`;
      document.getElementById("feedback").innerHTML =
        `<div class="explanation"><strong>Explanation:</strong><br>${item.e}</div>`;
      document.getElementById("nextBtn").style.display = "inline-block";
      document.getElementById("nextBtn").textContent =
        current === questions.length-1 ? "Show Result" : "Next";
    }

    function nextQuestion(){
      if(current < questions.length-1){
        current++;
        renderQuestion();
      }else{
        showResult();
      }
    }

    function showResult(){
      document.getElementById("quizArea").style.display = "none";
      const percentage = Math.round((score/questions.length)*100);

      let rating = "Needs more review";
      if(percentage >= 90) rating = "Excellent 🌟";
      else if(percentage >= 75) rating = "Very good 👏";
      else if(percentage >= 60) rating = "Good 👍";

      let reviewHtml = "";
      if(mistakes.length){
        reviewHtml = `<div class="review"><h3>Review your mistakes</h3>` +
          mistakes.map((m,i)=>`
            <div class="review-item">
              <strong>${i+1}. ${m.q}</strong><br>
              <span style="color:#b91c1c">Your answer: ${m.your}</span><br>
              <span style="color:#166534">Correct answer: ${m.correct}</span>
              <div class="small" style="margin-top:6px">${m.explanation}</div>
            </div>
          `).join("") + `</div>`;
      }

      document.getElementById("resultArea").style.display = "block";
      document.getElementById("resultArea").innerHTML = `
        <div class="result">
          <h2>Quiz completed 🎉</h2>
          <div class="score">${score} / ${questions.length}</div>
          <p><strong>${percentage}% — ${rating}</strong></p>
          <button class="main" onclick="restartQuiz()">Try Again</button>
        </div>
        ${reviewHtml}
      `;
    }

    function restartQuiz(){
      current = 0;
      score = 0;
      answered = false;
      mistakes.length = 0;
      document.getElementById("resultArea").style.display = "none";
      document.getElementById("quizArea").style.display = "block";
      renderQuestion();
    }

    renderQuestion();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glaucoma MCQ Exam</title>
<style>
:root{--bg:#eef4fb;--card:#fff;--primary:#0d47a1;--primary2:#1976d2;--text:#17212b;--muted:#66788a;--ok:#178447;--bad:#c62828;--border:#d9e4ef}
*{box-sizing:border-box} body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;background:linear-gradient(135deg,#eaf3ff,#f8fbff);color:var(--text)}
.wrap{max-width:920px;margin:auto;padding:20px} .header{background:linear-gradient(135deg,var(--primary),var(--primary2));color:white;border-radius:22px;padding:24px;box-shadow:0 12px 30px rgba(13,71,161,.2);margin-bottom:18px}
.header h1{margin:0 0 8px;font-size:30px} .header p{margin:0;line-height:1.6;opacity:.95}
.topbar{display:flex;gap:12px;align-items:center;background:var(--card);border:1px solid var(--border);border-radius:16px;padding:12px 15px;margin-bottom:18px;position:sticky;top:8px;z-index:10;box-shadow:0 6px 18px rgba(37,64,97,.08)}
.progress-wrap{flex:1;height:10px;background:#e5edf5;border-radius:20px;overflow:hidden} .progress{height:100%;width:0;background:linear-gradient(90deg,#1e88e5,#43a047);transition:.3s} .counter{font-weight:700;color:var(--primary);white-space:nowrap}
.question{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:20px;margin-bottom:16px;box-shadow:0 8px 22px rgba(37,64,97,.07)}
.qtitle{font-size:18px;font-weight:800;line-height:1.6;margin-bottom:13px} .num{display:inline-flex;align-items:center;justify-content:center;width:34px;height:34px;border-radius:50%;background:#e3f2fd;color:var(--primary);margin-right:8px;font-weight:900}
.option{display:block;border:2px solid #e2e9f0;border-radius:13px;padding:12px 14px;margin:9px 0;cursor:pointer;transition:.18s;background:#fbfdff;line-height:1.5}
.option:hover{border-color:#90caf9;background:#f2f8ff} .option input{margin-right:8px;transform:scale(1.15)} .option.correct{border-color:var(--ok);background:#e9f8ef;color:#0d5d31} .option.wrong{border-color:var(--bad);background:#fff0f0;color:#8e1717}
.explanation{display:none;margin-top:12px;padding:11px 13px;border-radius:12px;background:#f3f7fb;border-left:4px solid var(--primary2);line-height:1.65;color:#34495e}
.actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:24px 0 40px} button{border:0;border-radius:14px;padding:13px 22px;font-size:16px;font-weight:800;cursor:pointer} #submit{background:linear-gradient(135deg,#1976d2,#0d47a1);color:white} #reset{background:#e8eef5;color:#24384d}
#result{display:none;background:white;border-radius:20px;padding:24px;margin:20px 0;border:1px solid var(--border);text-align:center;box-shadow:0 10px 28px rgba(37,64,97,.12)} .score{font-size:42px;font-weight:900;color:var(--primary);margin:8px} .grade{font-size:20px;font-weight:800} .small{color:var(--muted);font-size:14px}
@media(max-width:600px){.wrap{padding:12px}.header h1{font-size:24px}.qtitle{font-size:16px}.question{padding:15px}}
</style>
</head>
<body>
<div class="wrap">
<section class="header"><h1>👁️ Glaucoma MCQ Exam</h1><p>50 questions covering congenital glaucoma, primary angle-closure glaucoma, primary open-angle glaucoma, visual field changes, investigations, and treatment.</p></section>
<div class="topbar"><div class="counter" id="counter">Answered: 0 / 56</div><div class="progress-wrap"><div class="progress" id="progress"></div></div></div>
<form id="quiz"></form>
<div class="actions"><button type="button" id="submit">Submit Exam</button><button type="button" id="reset">Restart Exam</button></div>
<div id="result"><div class="small">Final Score</div><div class="score" id="score"></div><div class="grade" id="grade"></div><p class="small">Review the highlighted answers and explanations below each question.</p></div>
</div>
<script>
const questions = [{"q": "Buphthalmos usually develops when intraocular pressure rises before the age of:", "o": ["1 year", "3 years", "10 years", "Puberty"], "a": 1, "e": "Before about 3 years of age, the sclera and cornea are sufficiently elastic to stretch in response to raised IOP."}, {"q": "The basic developmental abnormality in primary congenital glaucoma is:", "o": ["Pupillary block", "Trabecular dysgenesis", "Retinal detachment", "Lens opacity"], "a": 1, "e": "Trabecular dysgenesis impairs aqueous outflow through the anterior chamber angle."}, {"q": "Which condition must be excluded first in a child with suspected congenital glaucoma and opaque media?", "o": ["Retinoblastoma", "Simple myopia", "Conjunctivitis", "Dry eye"], "a": 0, "e": "Retinoblastoma is a serious differential diagnosis and should be excluded promptly."}, {"q": "The classical early triad of congenital glaucoma is:", "o": ["Pain, redness, vomiting", "Blepharospasm, lacrimation, photophobia", "Ptosis, diplopia, proptosis", "Miosis, itching, discharge"], "a": 1, "e": "The classic triad is blepharospasm, epiphora/lacrimation, and photophobia."}, {"q": "Haab's striae are:", "o": ["Vertical retinal tears", "Horizontal breaks in Descemet's membrane", "Corneal epithelial ulcers", "Iris adhesions"], "a": 1, "e": "Corneal stretching causes horizontal breaks in Descemet's membrane."}, {"q": "The anterior chamber in buphthalmos is usually:", "o": ["Shallow", "Deep", "Absent", "Filled with blood"], "a": 1, "e": "Enlargement of the globe commonly produces a deep anterior chamber."}, {"q": "A clear cornea, corneal diameter below 13 mm, and IOP below 30 mmHg favor:", "o": ["Trabeculectomy", "Goniotomy", "YAG iridotomy", "Enucleation"], "a": 1, "e": "A clear cornea allows visualization of the angle for goniotomy."}, {"q": "A hazy cornea, corneal diameter above 13 mm, and IOP above 30 mmHg favor:", "o": ["Trabeculotomy", "Goniotomy", "Laser trabeculoplasty", "Cycloplegia"], "a": 0, "e": "When the cornea is hazy, trabeculotomy opens Schlemm's canal externally."}, {"q": "The most serious complication of buphthalmos is:", "o": ["Simple astigmatism", "Glaucomatous optic atrophy", "Conjunctival pigmentation", "Temporary photophobia"], "a": 1, "e": "Persistent raised IOP can cause irreversible optic nerve damage and blindness."}, {"q": "Unilateral congenital glaucoma may lead to:", "o": ["Nystagmus only", "Concomitant squint and amblyopia", "Bilateral cataract", "Papilledema"], "a": 1, "e": "Unequal visual input may cause amblyopia and concomitant strabismus."}, {"q": "Bilateral congenital glaucoma is more likely to cause:", "o": ["Nystagmus", "Unilateral ptosis", "Papilledema", "Optic neuritis"], "a": 0, "e": "Severe bilateral visual deprivation in infancy may lead to nystagmus."}, {"q": "The sclera in buphthalmos is typically:", "o": ["Thick and white", "Thin and bluish", "Calcified", "Inflamed"], "a": 1, "e": "Stretching makes the sclera thin, allowing the underlying uvea to show through."}, {"q": "Iridodonesis means:", "o": ["Tremulous iris", "Dislocated retina", "Cloudy lens", "Fixed pupil"], "a": 0, "e": "Iridodonesis is trembling of the iris, often due to poor lens support."}, {"q": "A common refractive consequence of buphthalmos is:", "o": ["Hypermetropia only", "Axial myopia", "Presbyopia", "Emmetropia"], "a": 1, "e": "Elongation of the globe produces axial myopia."}, {"q": "In congenital glaucoma, optic disc cupping may be partly reversible because of:", "o": ["Retinal regeneration", "Widening of the scleral canal", "Lens swelling", "Corneal thinning"], "a": 1, "e": "In infants, elastic tissues can allow some reversal of cupping after IOP control."}, {"q": "The preferred imaging test to measure axial length in congenital glaucoma is:", "o": ["A-scan ultrasonography", "B-scan only", "CT orbit", "MRI brain"], "a": 0, "e": "A-scan is used to measure axial length."}, {"q": "Primary angle-closure glaucoma is characterized by closure of the angle by the:", "o": ["Peripheral iris", "Lens capsule", "Corneal epithelium", "Vitreous base"], "a": 0, "e": "The peripheral iris obstructs the trabecular meshwork."}, {"q": "The commonest mechanism in primary angle closure is:", "o": ["Trabecular sclerosis", "Pupillary block between iris and lens", "Retinal ischemia", "Ciliary paralysis"], "a": 1, "e": "Pupillary block causes iris bombe and angle closure."}, {"q": "A major anatomical risk factor for angle closure is:", "o": ["High axial myopia", "Hypermetropia with shallow anterior chamber", "Large cornea", "Aphakia"], "a": 1, "e": "Small hypermetropic eyes usually have shallow anterior chambers and narrow angles."}, {"q": "Which situation may precipitate an acute angle-closure attack?", "o": ["Pupil dilation in darkness", "Bright light causing miosis", "Topical antibiotic use", "Reading in daylight"], "a": 0, "e": "Mid-dilation in darkness may increase pupillary block."}, {"q": "The pupil in acute angle-closure glaucoma is usually:", "o": ["Pinpoint and reactive", "Mid-dilated, vertically oval, and fixed", "Fully dilated and reactive", "Irregular but briskly reactive"], "a": 1, "e": "Iris sphincter ischemia produces a fixed mid-dilated pupil."}, {"q": "The cornea in acute angle closure is commonly:", "o": ["Clear", "Steamy due to edema", "Ulcerated", "Conical"], "a": 1, "e": "Very high IOP causes corneal edema and a steamy appearance."}, {"q": "The anterior chamber during an acute angle-closure attack is:", "o": ["Deep", "Shallow", "Normal in every case", "Filled with vitreous"], "a": 1, "e": "An anatomically shallow anterior chamber is typical."}, {"q": "Which symptom combination strongly suggests acute angle closure?", "o": ["Painless peripheral field loss", "Painful red eye with blurred vision and vomiting", "Itchy eye with discharge", "Gradual reading difficulty only"], "a": 1, "e": "Acute angle closure presents with severe ocular pain, red eye, blurred vision, headache, nausea, and vomiting."}, {"q": "Which drug is often given only after IOP begins to fall in acute angle closure?", "o": ["Timolol", "Acetazolamide", "Pilocarpine", "Mannitol"], "a": 2, "e": "Pilocarpine is less effective when the iris sphincter is ischemic at very high IOP."}, {"q": "The definitive treatment for pupillary-block angle closure is:", "o": ["Laser peripheral iridotomy", "Laser trabeculoplasty", "Vitrectomy", "Corneal graft"], "a": 0, "e": "Peripheral iridotomy bypasses the pupillary block."}, {"q": "Why is prophylactic iridotomy often performed in the fellow eye?", "o": ["The fellow eye is often anatomically at risk", "To improve color vision", "To treat cataract", "To prevent myopia"], "a": 0, "e": "The fellow eye frequently shares the same narrow-angle anatomy."}, {"q": "If peripheral anterior synechiae involve less than 50% of the angle, the preferred procedure in the provided notes is:", "o": ["YAG peripheral iridotomy", "Subscleral trabeculectomy", "Vitrectomy", "Cyclocryotherapy"], "a": 0, "e": "With limited PAS, iridotomy may relieve the pupillary block."}, {"q": "If peripheral anterior synechiae involve more than 50% of the angle, the preferred procedure in the provided notes is:", "o": ["Observation", "Subscleral trabeculectomy", "Pilocarpine alone", "Laser trabeculoplasty"], "a": 1, "e": "Extensive PAS indicates permanent angle closure and often requires filtration surgery."}, {"q": "Peripheral anterior synechiae are adhesions between the:", "o": ["Peripheral iris and trabecular meshwork", "Lens and retina", "Cornea and lens", "Ciliary body and sclera"], "a": 0, "e": "PAS are permanent adhesions of the peripheral iris to the angle structures."}, {"q": "Primary open-angle glaucoma is also called:", "o": ["Acute congestive glaucoma", "Chronic simple glaucoma", "Congenital glaucoma", "Phacolytic glaucoma"], "a": 1, "e": "POAG is a chronic, slowly progressive glaucoma."}, {"q": "The main outflow abnormality in POAG is:", "o": ["Pupillary block", "Trabecular sclerosis with increased outflow resistance", "Lens dislocation", "Excess aqueous secretion only"], "a": 1, "e": "The angle is open, but aqueous outflow through the trabecular meshwork is reduced."}, {"q": "The angle on gonioscopy in POAG is:", "o": ["Closed", "Open", "Blocked by lens", "Not visible because of corneal edema"], "a": 1, "e": "By definition, the anterior chamber angle is open."}, {"q": "The typical early clinical presentation of POAG is:", "o": ["Severe painful red eye", "Asymptomatic, found on routine examination", "Sudden complete blindness", "Marked photophobia"], "a": 1, "e": "POAG is often silent until significant field loss occurs."}, {"q": "A recognized risk factor for POAG is:", "o": ["Age over 40 years", "Young age only", "Hyperopia only", "Acute conjunctivitis"], "a": 0, "e": "Risk rises with age, family history, elevated IOP, myopia, and other factors."}, {"q": "The most important structural fundus sign of POAG is:", "o": ["Optic disc edema", "Progressive optic disc cupping", "Macular star", "Cherry-red spot"], "a": 1, "e": "Glaucomatous optic neuropathy produces progressive widening and deepening of the cup."}, {"q": "A cup-to-disc ratio above which value is considered suspicious in the provided notes?", "o": ["0.1", "0.3", "0.9 only", "1.5"], "a": 1, "e": "A C/D ratio above 0.3 or significant asymmetry may be suspicious, though clinical context is essential."}, {"q": "Which test measures intraocular pressure?", "o": ["Tonometry", "Perimetry", "Pachymetry", "Gonioscopy"], "a": 0, "e": "Tonometry measures IOP."}, {"q": "Which test evaluates the anterior chamber angle?", "o": ["Gonioscopy", "OCT macula", "A-scan", "Color vision testing"], "a": 0, "e": "Gonioscopy directly assesses whether the angle is open or closed."}, {"q": "Why is pachymetry useful in glaucoma assessment?", "o": ["It measures retinal thickness", "It helps interpret IOP by measuring corneal thickness", "It detects cataract", "It measures visual acuity"], "a": 1, "e": "Central corneal thickness affects the accuracy and interpretation of tonometry readings."}, {"q": "Why is OCT performed in glaucoma?", "o": ["To measure axial length only", "To measure RNFL thickness and detect early structural damage", "To diagnose conjunctivitis", "To measure tear production"], "a": 1, "e": "OCT can detect thinning of the retinal nerve fiber layer before obvious visual field loss."}, {"q": "Which fibers are described as most vulnerable and affected earliest in glaucomatous field loss?", "o": ["Papillomacular bundle", "Temporal arcuate fibers", "Optic chiasm fibers", "Nasal retinal fibers only"], "a": 1, "e": "The temporal arcuate fibers are crowded and vulnerable."}, {"q": "Which bundle is affected relatively late in glaucoma?", "o": ["Papillomacular bundle", "Temporal arcuate bundle", "Superior arcuate bundle", "Inferior arcuate bundle"], "a": 0, "e": "The papillomacular bundle is relatively less crowded and often affected late."}, {"q": "The earliest field defect listed in the notes is:", "o": ["Paracentral nasal scotoma", "Bitemporal hemianopia", "Central scotoma", "Homonymous hemianopia"], "a": 0, "e": "Paracentral nasal scotoma is an early glaucomatous field defect."}, {"q": "A Seidel scotoma is best described as:", "o": ["An extension of the blind spot", "A central scotoma from macular disease", "A bitemporal defect", "A complete ring scotoma"], "a": 0, "e": "Seidel scotoma is a sickle-shaped extension from the blind spot."}, {"q": "Bjerrum scotoma is also called:", "o": ["Arcuate scotoma", "Central scotoma", "Cecocentral scotoma", "Ring scotoma"], "a": 0, "e": "Bjerrum scotoma follows the arcuate nerve fiber pattern."}, {"q": "A late visual field pattern in advanced glaucoma is:", "o": ["Tubular vision", "Bitemporal hemianopia", "Altitudinal defect", "Central field enlargement"], "a": 0, "e": "Advanced glaucoma may leave only a small central tubular field."}, {"q": "Visual acuity in advanced glaucoma may remain near normal despite:", "o": ["Severe peripheral field loss", "No optic nerve damage", "Improved night vision", "Normal visual fields"], "a": 0, "e": "Central acuity can be preserved until late while peripheral field loss causes major disability."}, {"q": "A common first-line drug class for POAG is:", "o": ["Prostaglandin analogues", "Topical antibiotics", "Cycloplegics", "Mydriatics"], "a": 0, "e": "Prostaglandin analogues such as latanoprost lower IOP effectively, often with once-daily dosing."}, {"q": "Latanoprost lowers IOP mainly by:", "o": ["Increasing uveoscleral outflow", "Blocking the pupil", "Reducing corneal thickness", "Dilating the angle mechanically"], "a": 0, "e": "Prostaglandin analogues increase uveoscleral aqueous outflow."}, {"q": "Timolol lowers IOP mainly by:", "o": ["Reducing aqueous production", "Increasing uveoscleral outflow", "Causing mydriasis", "Creating a fistula"], "a": 0, "e": "Topical beta-blockers reduce aqueous humor secretion."}, {"q": "A major contraindication to topical timolol is:", "o": ["Bronchial asthma", "Myopia", "Presbyopia", "Cataract"], "a": 0, "e": "Beta-blockers may cause bronchospasm and are avoided in asthma and certain cardiac conditions."}, {"q": "Dorzolamide belongs to which drug class?", "o": ["Topical carbonic anhydrase inhibitor", "Prostaglandin analogue", "Beta-blocker", "Miotic"], "a": 0, "e": "Dorzolamide reduces aqueous production by inhibiting carbonic anhydrase."}, {"q": "Acetazolamide is usually used as:", "o": ["A systemic carbonic anhydrase inhibitor", "A topical beta-blocker", "A miotic", "A prostaglandin analogue"], "a": 0, "e": "Acetazolamide is a systemic carbonic anhydrase inhibitor used when greater IOP reduction is needed."}, {"q": "Laser trabeculoplasty lowers IOP by:", "o": ["Improving trabecular aqueous drainage", "Creating an iris hole", "Removing the lens", "Destroying the retina"], "a": 0, "e": "Laser treatment improves outflow through the trabecular meshwork."}, {"q": "If medical and laser treatment fail in POAG, a common surgical option is:", "o": ["Trabeculectomy", "YAG capsulotomy", "Dacryocystorhinostomy", "Keratoplasty"], "a": 0, "e": "Trabeculectomy creates a filtration pathway to lower IOP."}];
const quiz=document.getElementById("quiz");
questions.forEach((item,i)=>{const d=document.createElement("section");d.className="question";d.dataset.index=i;d.innerHTML=`<div class="qtitle"><span class="num">${i+1}</span>${item.q}</div><div>${item.o.map((x,j)=>`<label class="option"><input type="radio" name="q${i}" value="${j}"><span>${String.fromCharCode(65+j)}. ${x}</span></label>`).join("")}</div><div class="explanation"><strong>Explanation:</strong> ${item.e}</div>`;quiz.appendChild(d)});
function updateProgress(){let n=0;questions.forEach((_,i)=>{if(document.querySelector(`input[name="q${i}"]:checked`))n++});counter.textContent=`Answered: ${n} / ${questions.length}`;progress.style.width=(n/questions.length*100)+"%"}
quiz.addEventListener("change",updateProgress);
submit.addEventListener("click",()=>{let s=0;questions.forEach((item,i)=>{const sec=document.querySelector(`.question[data-index="${i}"]`),labels=sec.querySelectorAll(".option"),chosen=document.querySelector(`input[name="q${i}"]:checked`);labels.forEach(l=>l.classList.remove("correct","wrong"));labels[item.a].classList.add("correct");if(chosen){const v=Number(chosen.value);if(v===item.a)s++;else labels[v].classList.add("wrong")}sec.querySelector(".explanation").style.display="block"});const p=Math.round(s/questions.length*100);score.textContent=`${s} / ${questions.length} (${p}%)`;grade.textContent=p>=90?"Excellent 🌟":p>=80?"Very Good 👏":p>=70?"Good 👍":p>=60?"Pass — review the weak areas 📚":"Needs more revision 💪";result.style.display="block";result.scrollIntoView({behavior:"smooth"})});
reset.addEventListener("click",()=>{quiz.reset();document.querySelectorAll(".option").forEach(x=>x.classList.remove("correct","wrong"));document.querySelectorAll(".explanation").forEach(x=>x.style.display="none");result.style.display="none";updateProgress();window.scrollTo({top:0,behavior:"smooth"})})
</script>
</body></html>
